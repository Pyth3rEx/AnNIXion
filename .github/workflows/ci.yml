name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Nix CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Required for nixosTest to run QEMU VMs at acceptable speed
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      # hardware-configuration.nix is gitignored (machine-specific).
      # CI uses a minimal QEMU-guest stub so the flake evaluates cleanly.
      - name: Stub hardware configuration
        run: |
          cat > hardware-configuration.nix << 'EOF'
          { modulesPath, lib, ... }:
          {
            imports = [ (modulesPath + "/profiles/qemu-guest.nix") ];
            boot.initrd.availableKernelModules = [ "ahci" "xhci_pci" "virtio_pci" "sr_mod" "virtio_blk" ];
            boot.initrd.kernelModules = [];
            boot.kernelModules = [];
            boot.extraModulePackages = [];
            fileSystems."/" = { device = "/dev/disk/by-label/nixos"; fsType = "ext4"; };
            fileSystems."/boot" = {
              device = "/dev/disk/by-label/boot";
              fsType = "vfat";
              options = [ "umask=0077" ];
            };
            swapDevices = [];
            nixpkgs.hostPlatform = lib.mkDefault "x86_64-linux";
          }
          EOF

      # L1 — flake evaluation: catches syntax errors, bad option types,
      # undefined references. --no-build keeps this step fast.
      - name: "[L1] Flake evaluation"
        run: nix flake check --no-build

      # L2 — full system closure: proves every package in the config
      # resolves and all modules compose without conflicts.
      - name: "[L2] System closure build"
        run: |
          nix build .#nixosConfigurations.AnNIXion.config.system.build.toplevel \
            --print-build-logs --no-link

      # L3 — VM tests: boot + service behaviour, security tool presence.
      # Runs in QEMU via the NixOS test framework.
      - name: "[L3] VM tests"
        run: |
          nix build \
            .#checks.x86_64-linux.boot \
            .#checks.x86_64-linux.security-tools \
            --print-build-logs --no-link

  iso:
    name: Build ISO
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: write
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require version bump (PR)
        if: github.event_name == 'pull_request'
        run: |
          MAIN_VERSION=$(git show origin/main:VERSION 2>/dev/null || echo "0.0.0")
          CURRENT_VERSION=$(cat VERSION)
          if [ "$MAIN_VERSION" = "$CURRENT_VERSION" ]; then
            echo "::error file=VERSION::VERSION is still $CURRENT_VERSION — bump it before merging (patch: x.y.Z, minor: x.Y.0, major: X.0.0)."
            exit 1
          fi
          echo "Version bumped: $MAIN_VERSION → $CURRENT_VERSION"

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      # AnNIXion-iso doesn't use hardware-configuration.nix, but nix build
      # evaluates the whole flake, including nixosConfigurations.AnNIXion.
      - name: Stub hardware configuration
        run: |
          cat > hardware-configuration.nix << 'EOF'
          { modulesPath, lib, ... }:
          {
            imports = [ (modulesPath + "/profiles/qemu-guest.nix") ];
            boot.initrd.availableKernelModules = [ "ahci" "xhci_pci" "virtio_pci" "sr_mod" "virtio_blk" ];
            boot.initrd.kernelModules = [];
            boot.kernelModules = [];
            boot.extraModulePackages = [];
            fileSystems."/" = { device = "/dev/disk/by-label/nixos"; fsType = "ext4"; };
            fileSystems."/boot" = {
              device = "/dev/disk/by-label/boot";
              fsType = "vfat";
              options = [ "umask=0077" ];
            };
            swapDevices = [];
            nixpkgs.hostPlatform = lib.mkDefault "x86_64-linux";
          }
          EOF

      - name: Build ISO
        run: |
          nix build .#packages.x86_64-linux.iso \
            --print-build-logs \
            --out-link result-iso

      - name: Locate ISO
        id: iso
        run: |
          ISO=$(find result-iso/ -name "*.iso" -type f | head -1)
          if [ -z "$ISO" ]; then
            echo "::error::No .iso file found under result-iso/ — directory contents:"
            find result-iso/ -type f
            exit 1
          fi
          echo "path=$ISO" >> "$GITHUB_OUTPUT"
          echo "Found ISO: $ISO"

      - name: Read version
        id: version
        run: echo "tag=v$(cat VERSION)" >> "$GITHUB_OUTPUT"

      # On PRs: upload as a downloadable artifact so you can test the ISO
      # before merging. Find it under Actions → your run → Artifacts.
      - name: Upload ISO artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: AnNIXion-${{ steps.version.outputs.tag }}
          path: ${{ steps.iso.outputs.path }}
          retention-days: 7

      # On merge to main: publish a GitHub Release if this version tag doesn't
      # exist yet. Merges that don't bump VERSION are silently skipped.
      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ISO="${{ steps.iso.outputs.path }}"

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists — bump VERSION to publish a new release."
          else
            gh release create "$TAG" \
              --title "AnNIXion $TAG" \
              --notes "Built from commit \`${{ github.sha }}\`.

          **Live credentials:** \`operator\` / \`operator\`
          Flash the ISO to a USB drive with Balena Etcher or \`dd\`, boot, and use the desktop installer." \
              "${{ steps.iso.outputs.path }}"
          fi
